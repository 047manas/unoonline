<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNO Online - Multiplayer Card Game</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <div id="toast-container"></div>

        <!-- Screen 1: Landing -->
        <div id="landing-screen" class="screen active">
            <div class="card glass-panel">
                <h1 class="logo">UNO<span class="logo-accent">!</span></h1>
                <p class="subtitle">Real-time Multiplayer</p>
                <div class="input-group">
                    <input type="text" id="player-name" placeholder="Enter your name" maxlength="15">
                </div>
                <div class="action-buttons">
                    <button id="btn-create-room" class="btn primary">Create Room</button>
                    <div class="divider"><span>OR</span></div>
                    <div class="join-group">
                        <input type="text" id="join-room-code" placeholder="Room Code" maxlength="6">
                        <button id="btn-join-room" class="btn secondary">Join</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Screen 2: Lobby -->
        <div id="lobby-screen" class="screen">
            <div class="card glass-panel lobby-panel">
                <h2>Room: <span id="lobby-room-code" class="highlight"></span></h2>
                <p>Waiting for players...</p>
                <ul id="player-list" class="player-list">
                    <!-- Players will be injected here -->
                </ul>
                <button id="btn-start-game" class="btn primary hidden">Start Game</button>
                <p id="waiting-msg" class="hint">Waiting for host to start...</p>
            </div>
        </div>

        <!-- Screen 3: Game Board -->
        <div id="game-screen" class="screen">
            <!-- Opponents -->
            <div id="opponents-container" class="opponents-container"></div>

            <!-- Game Center -->
            <div class="game-center">
                <div class="deck-container">
                    <div id="draw-pile" class="uno-card card-back">
                        <div class="ellipse"><span class="uno-text">UNO</span></div>
                    </div>
                    <div id="discard-pile-container">
                        <!-- Discard pile injected here -->
                    </div>
                </div>

                <div class="turn-indicator">
                    <span id="turn-text">Waiting...</span>
                    <div id="direction-arrow" class="arrow clockwise">↻</div>
                </div>
            </div>

            <!-- Player Area -->
            <div class="player-area">
                <div class="player-controls">
                    <button id="btn-uno" class="btn danger">UNO!</button>
                </div>
                <div id="player-hand" class="hand-container">
                    <!-- Cards injected here -->
                </div>
            </div>

            <!-- Color Picker Modal -->
            <div id="color-picker-modal" class="modal hidden">
                <div class="modal-content glass-panel">
                    <h3>Choose Color</h3>
                    <div class="color-options">
                        <div class="color-btn bg-red" data-color="red"></div>
                        <div class="color-btn bg-blue" data-color="blue"></div>
                        <div class="color-btn bg-green" data-color="green"></div>
                        <div class="color-btn bg-yellow" data-color="yellow"></div>
                    </div>
                </div>
            </div>

            <!-- Game Over Modal -->
            <div id="game-over-modal" class="modal hidden">
                <div class="modal-content glass-panel">
                    <h2 id="winner-text">Someone won!</h2>
                    <br>
                    <button id="btn-play-again" class="btn primary">Back to Menu</button>
                </div>
            </div>

            <!-- Reaction Bar -->
            <div class="reaction-bar glass-panel">
                <button class="reaction-btn" data-emoji="😂">😂</button>
                <button class="reaction-btn" data-emoji="😭">😭</button>
                <button class="reaction-btn" data-emoji="😡">😡</button>
                <button class="reaction-btn" data-emoji="🔥">🔥</button>
                <button class="reaction-btn" data-emoji="🤯">🤯</button>
            </div>

            <!-- Floating Emojis Container -->
            <div id="floating-emojis"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/cards.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
